<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harve</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alice&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #FFFFFF;
    color: #0A1C5C;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    max-width: 420px;
    padding: 40px 24px;
  }
  .logo { margin-bottom: 32px; }
  h1 {
    font-family: 'Alice', serif;
    font-weight: normal;
    font-size: 28px;
    color: #0A1C5C;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15px;
    color: #8B95A8;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .link {
    color: #4A6CF7;
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
  }
  .link:hover { text-decoration: underline; }
  .divider {
    width: 48px;
    height: 1px;
    background: #E2E6EF;
    margin: 28px auto;
  }
  .secondary {
    font-size: 13px;
    color: #B0B8C8;
  }
  .secondary a {
    color: #4A6CF7;
    text-decoration: none;
    font-weight: 500;
  }
  .secondary a:hover { text-decoration: underline; }
  .help {
    font-size: 12px;
    color: #C0C6D2;
    margin-top: 16px;
  }
  .help a { color: #8B95A8; text-decoration: none; }
  .help a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container" id="openingView">
  <div class="logo">
    <svg width="48" height="48" viewBox="0 0 20 20" fill="none">
      <defs><mask id="lm"><rect width="20" height="20" fill="black"/><circle cx="10" cy="10" r="9" fill="white"/>
      <path d="M4 7.6C6.5 6.75 8.5 6.75 10 7.6 11.5 8.45 13.5 8.45 16 7.6" stroke="black" stroke-width="2.1" stroke-linecap="round" fill="none"/>
      <path d="M4 10C6.5 9.15 8.5 9.15 10 10 11.5 10.85 13.5 10.85 16 10" stroke="black" stroke-width="2.1" stroke-linecap="round" fill="none"/>
      <path d="M4 12.4C6.5 11.55 8.5 11.55 10 12.4 11.5 13.25 13.5 13.25 16 12.4" stroke="black" stroke-width="2.1" stroke-linecap="round" fill="none"/>
      </mask></defs>
      <g mask="url(#lm)"><circle cx="10" cy="10" r="9.2" fill="#0A1C5C"/></g>
      <circle cx="10" cy="10" r="9" stroke="#0A1C5C" stroke-width="1.5" fill="none"/>
    </svg>
  </div>
  <h1>You're signed in</h1>
  <p class="subtitle">
    You can now start earning directly from the Harve app.<br>
    You can close this tab.
  </p>
  <div class="divider"></div>
  <p class="secondary">
    Wrong account? Sign out from the Harve app and sign in again.
  </p>
  <p class="secondary" style="margin-top: 12px">
    Don't have Harve installed? <a href="/">Download now</a>.
  </p>
  <p class="help"><a href="mailto:support@harve.ai">Need help?</a></p>
</div>

<script>
(function() {
  setTimeout(function() { window.close(); }, 2500);
})();
</script>
</body>
</html>
